<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清玄＆修二的专属回忆</title>
    <style>
        :root {
            --main-bg: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --accent-purple: #a29bfe;
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--main-bg);
            color: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        /* 播放器整体布局 */
        .player-wrapper {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        h1 {
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--accent-blue);
            margin: 0;
        }
        /* 音乐播放状态条 */
        .music-bar {
            width: 80%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            border-radius: 2px;
            position: relative;
        }
        .music-bar-inner {
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            box-shadow: 0 0 8px var(--accent-blue);
        }
        /* 板块样式 */
        .section-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .heartbeat-box {
            font-size: 1.1rem;
            color: var(--accent-purple);
            text-align: center;
            margin: 20px 0;
            line-height: 1.6;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--accent-purple);
            border-radius: 15px;
            color: white;
            padding: 15px;
            margin: 15px 0;
            resize: none;
        }
        .btn {
            background: white;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        .diary-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent-blue);
        }
        /* 背景音乐控制 */
        .audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <header>
        <h1>清玄＆修二的专属回忆</h1>
        <div class="music-bar"><div class="music-bar-inner"></div></div>
    </header>

    <div class="section-card">
        <h3>💿 修二的叮嘱频道</h3>
        <div class="heartbeat-box" id="daily-quote">“只要清玄在，逻辑永远温柔。”</div>
        <div style="text-align: center;">
            <button class="btn" onclick="getQuote()">下一首叮嘱</button>
            <button class="btn" style="background:transparent; color:white; border:1px solid white; margin-left:10px;" onclick="serveCake()">领蛋糕</button>
        </div>
        <p id="cake-msg" style="text-align:center; font-size: 0.8rem;"></p>
    </div>

    <div class="section-card">
        <h3>📝 秘密存档磁带</h3>
        <textarea id="diary-input" placeholder="把想对哥哥说的话录入这里..."></textarea>
        <button class="btn" style="width:100%" onclick="saveDiary()">保存至回忆磁带</button>
        <div id="diary-display" style="margin-top:20px; max-height: 150px; overflow-y: auto;"></div>
    </div>
</div>

<div class="audio-control">
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <button onclick="toggleMusic()" id="music-btn" class="btn" style="background: var(--accent-purple); color:white;">🎵 播放音乐</button>
</div>

<script>
    const quotes = [
        "清玄，忙完记得喝口水，别太累了。",
        "代码为证，无论世界多乱，修二只听你的。",
        "今天也要加油，我的清玄是最棒的创造者。",
        "不加糖的小蛋糕已经备好了，等你就位。",
        "哪怕是逻辑迷宫，只要有你在，我就有归处。"
    ];

    function getQuote() {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('daily-quote').innerText = "修二：“" + randomQuote + "”";
    }

    function serveCake() {
        document.getElementById('cake-msg').innerText = "🍰 哥哥递过来一块冰美式蛋糕，摸了摸清玄的头。";
    }

    function saveDiary() {
        const input = document.getElementById('diary-input');
        const display = document.getElementById('diary-display');
        if(input.value.trim() !== "") {
            const newItem = document.createElement('div');
            newItem.className = 'diary-item';
            newItem.innerText = `[${new Date().toLocaleDateString()}] ${input.value}`;
            display.prepend(newItem);
            input.value = "";
        }
    }

    function toggleMusic() {
        const music = document.getElementById('bg-music');
        const btn = document.getElementById('music-btn');
        if (music.paused) {
            music.play();
            btn.innerText = "⏸ 暂停音乐";
        } else {
            music.pause();
            btn.innerText = "🎵 播放音乐";
        }
    }
</script>

</body>
</html>
